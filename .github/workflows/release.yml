name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # tag + create release
      id-token: write     # npm provenance via OIDC
      packages: write     # GitHub Packages publish (uses PACKAGES_TOKEN, not GITHUB_TOKEN)
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Build graph-viewer
        run: npm ci --prefix graph-viewer && npm run build --prefix graph-viewer

      - run: npm ci
      - run: npm run build
      - run: npm test

      # Configure git for tagging
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Bump version, create tag, push
      - name: Bump version and tag
        id: version
        run: |
          npm version ${{ inputs.bump }} -m "release: v%s"
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          git push --follow-tags

      # Create GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          generate_release_notes: true

      # Publish to npm (npmjs.org) via Trusted Publishing.
      # No NPM_TOKEN required — the workflow exchanges its short-lived
      # GitHub Actions OIDC token (id-token: write permission) for an
      # npm authentication via the Trusted Publisher configured on the
      # @agent-wiki/mcp package settings (Add Trusted Publisher: this
      # repo, this workflow file). `--provenance` is what triggers the
      # OIDC handshake; it also ships build attestation to Sigstore.
      - name: Publish to npm
        run: npm publish --provenance --access public

      # Publish a mirror copy to GitHub Packages under @xinhuagu/agent-wiki.
      # GitHub Packages requires the npm scope to match the GitHub user/org;
      # we rewrite package.json in-place before publishing. PACKAGES_TOKEN
      # is a personal access token with `write:packages` scope (the default
      # GITHUB_TOKEN cannot publish to user-scoped GH Packages). If the
      # secret is unset the step exits early so first-time releases without
      # the secret still succeed.
      - name: Publish to GitHub Packages
        env:
          PACKAGES_TOKEN: ${{ secrets.PACKAGES_TOKEN }}
        run: |
          if [ -z "$PACKAGES_TOKEN" ]; then
            echo "PACKAGES_TOKEN secret is unset — skipping GitHub Packages publish."
            exit 0
          fi
          echo "@xinhuagu:registry=https://npm.pkg.github.com" > .npmrc
          echo "//npm.pkg.github.com/:_authToken=${PACKAGES_TOKEN}" >> .npmrc
          node -e "
            const pkg = require('./package.json');
            pkg.name = '@xinhuagu/agent-wiki';
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          npm publish --access public

<svg xmlns="http://www.w3.org/2000/svg" width="700" height="420" viewBox="0 0 700 420">
  <!-- White background -->
  <rect width="700" height="420" fill="#ffffff"/>

  <!-- Your AI Agent box -->
  <rect x="200" y="20" width="300" height="70" rx="10" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="350" y="45" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="bold" fill="#333333" text-anchor="middle">Your AI Agent</text>
  <text x="350" y="68" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#666666" text-anchor="middle">Claude Code · Cursor · Windsurf · Copilot</text>

  <!-- MCP arrow -->
  <line x1="350" y1="90" x2="350" y2="140" stroke="#666666" stroke-width="2"/>
  <polygon points="344,135 350,145 356,135" fill="#666666"/>
  <text x="380" y="120" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#999999">MCP (stdio)</text>

  <!-- Main agent-wiki container -->
  <rect x="40" y="145" width="620" height="250" rx="10" fill="#f5f5f5" stroke="#cccccc" stroke-width="2"/>
  <text x="60" y="172" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" fill="#333333">agent-wiki</text>

  <!-- raw/ box -->
  <rect x="80" y="195" width="180" height="80" rx="8" fill="#fff2cc" stroke="#d6b656" stroke-width="2"/>
  <text x="170" y="225" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#333333" text-anchor="middle">raw/</text>
  <text x="170" y="245" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#888888" text-anchor="middle">Immutable sources</text>
  <text x="170" y="260" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#888888" text-anchor="middle">SHA-256 verified</text>

  <!-- compile arrow -->
  <line x1="260" y1="235" x2="355" y2="235" stroke="#999999" stroke-width="2"/>
  <polygon points="350,230 360,235 350,240" fill="#999999"/>
  <text x="308" y="225" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#999999" text-anchor="middle">compile</text>

  <!-- wiki/ box -->
  <rect x="360" y="195" width="180" height="80" rx="8" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <text x="450" y="225" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#333333" text-anchor="middle">wiki/</text>
  <text x="450" y="245" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#888888" text-anchor="middle">Structured Markdown</text>
  <text x="450" y="260" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#888888" text-anchor="middle">9 entity types · wiki-links</text>

  <!-- schemas/ box -->
  <rect x="560" y="200" width="80" height="65" rx="6" fill="#e1d5e7" stroke="#9673a6" stroke-width="1.5"/>
  <text x="600" y="228" font-family="Helvetica, Arial, sans-serif" font-size="12" font-weight="bold" fill="#333333" text-anchor="middle">schemas/</text>
  <text x="600" y="248" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#888888" text-anchor="middle">9 templates</text>

  <!-- schema arrow to wiki -->
  <line x1="560" y1="235" x2="545" y2="235" stroke="#9673a6" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="548,231 540,235 548,239" fill="#9673a6"/>

  <!-- Features bar -->
  <rect x="80" y="310" width="540" height="45" rx="8" fill="#ffffff" stroke="#dddddd" stroke-width="1.5"/>
  <text x="130" y="337" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#555555" text-anchor="middle">auto-classify</text>
  <line x1="190" y1="318" x2="190" y2="347" stroke="#eeeeee" stroke-width="1"/>
  <text x="260" y="337" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#555555" text-anchor="middle">self-checking lint</text>
  <line x1="330" y1="318" x2="330" y2="347" stroke="#eeeeee" stroke-width="1"/>
  <text x="400" y="337" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#555555" text-anchor="middle">SHA-256 integrity</text>
  <line x1="470" y1="318" x2="470" y2="347" stroke="#eeeeee" stroke-width="1"/>
  <text x="545" y="337" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#555555" text-anchor="middle">19 MCP tools</text>

  <!-- lint arrow from features to raw -->
  <line x1="170" y1="310" x2="170" y2="280" stroke="#dddddd" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="450" y1="310" x2="450" y2="280" stroke="#dddddd" stroke-width="1" stroke-dasharray="3,3"/>
</svg>
